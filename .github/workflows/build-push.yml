name: Build and Push to ECR

# Runs on every push to main that touches application or deployment files.
# Skips unrelated changes (docs, README, etc.) using the paths filter.
on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'pom.xml'
      - 'appspec.yaml'
      - 'taskdef.json'
      - '.github/workflows/build-push.yml'

# id-token: write is required for GitHub OIDC — allows the workflow to
# request a short-lived JWT and exchange it for temporary AWS credentials.
# No long-lived AWS access keys are stored anywhere.
permissions:
  id-token: write
  contents: read

# All values come from GitHub repository variables (Settings → Variables).
# Nothing is hardcoded — changing a value in GitHub takes effect on the next run.
env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}

jobs:
  build-and-push:
    name: Build, Push, Update Pipeline Artifact
    runs-on: ubuntu-latest

    steps:
      # Pull the repository code onto the runner so we can build the Docker image.
      - name: Checkout
        uses: actions/checkout@v4

      # Exchange the GitHub OIDC token for temporary AWS credentials.
      # The role (AWS_ROLE_ARN) is defined in CloudFormation and trusts only
      # this repository on the main branch — no other repo can assume it.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Authenticate Docker against ECR so we can push images.
      # Outputs the registry URL (e.g. 711387109786.dkr.ecr.eu-central-1.amazonaws.com)
      # used to tag and push the image in the next step.
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          # Tag the image with the exact git commit SHA for full traceability.
          # Combined with ECR immutable tags, this guarantees every image can be
          # traced back to the exact commit that produced it.
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # If this workflow is re-triggered for the same commit (e.g. a workflow
          # file fix), the image tag already exists in ECR and cannot be overwritten
          # (immutable tags). Skip the build — the image is identical anyway.
          if aws ecr describe-images \
              --repository-name $ECR_REPOSITORY \
              --image-ids imageTag=$IMAGE_TAG \
              --query 'imageDetails[0].imageDigest' \
              --output text 2>/dev/null | grep -q '^sha256:'; then
            echo "Image $IMAGE_TAG already exists in ECR — skipping build"
          else
            docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
            docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          fi

          # Save the full image URI as a step output so the next step can reference it.
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Upload deployment artifacts to S3
        env:
          IMAGE_URI: ${{ steps.build-image.outputs.image }}
          S3_BUCKET: ${{ vars.PIPELINE_ARTIFACT_BUCKET }}
        run: |
          # imageDetail.json — tells CodePipeline which image URI to inject into
          # the <IMAGE1_NAME> placeholder in taskdef.json during the deploy stage.
          printf '{"ImageURI": "%s"}' "$IMAGE_URI" > imageDetail.json

          # Package all three deployment files into a single zip.
          # taskdef.json and appspec.yaml are committed to the repo.
          # imageDetail.json is the only file generated at runtime.
          zip artifacts.zip taskdef.json imageDetail.json appspec.yaml
          aws s3 cp artifacts.zip s3://$S3_BUCKET/artifacts.zip

          # Explicitly start the pipeline after the S3 upload is complete.
          # The EventBridge rule also triggers on ECR push, but it fires before
          # this step runs — meaning the S3 artifact would not exist yet.
          aws codepipeline start-pipeline-execution --name ecs-lab-pipeline

      # Write a summary to the GitHub Actions run page showing what was deployed.
      - name: Summary
        run: |
          echo "### Image pushed to ECR" >> $GITHUB_STEP_SUMMARY
          echo "**Image URI:** ${{ steps.build-image.outputs.image }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
