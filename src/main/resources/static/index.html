<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ECS CI/CD Lab</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 16px;
      padding: 48px 56px;
      text-align: center;
      max-width: 540px;
      width: 90%;
      box-shadow: 0 0 40px rgba(99, 179, 237, 0.08);
    }

    .badge {
      display: inline-block;
      background: #1e3a5f;
      color: #63b3ed;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 20px;
      border: 1px solid #2b6cb0;
      margin-bottom: 28px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .lab-name {
      font-size: 1.1rem;
      color: #63b3ed;
      font-weight: 500;
      margin-bottom: 32px;
    }

    .divider {
      border: none;
      border-top: 1px solid #2d3748;
      margin: 28px 0;
    }

    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      text-align: left;
    }

    .meta-item label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #718096;
      margin-bottom: 4px;
    }

    .meta-item span {
      font-size: 13px;
      color: #a0aec0;
      font-family: "SFMono-Regular", Consolas, monospace;
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #48bb78;
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">AWS ECS · Fargate · Blue/Green Deployment</div>

    <h1>Shema Alphonse</h1>

    <div class="lab-name">ECS CI/CD Lab v2.0</div>
    <div class="lab-name">Welcome to ECS Lab - VERSION 2 RUNNING! </div>

    <hr class="divider" />

    <div class="meta">
      <div class="meta-item">
        <label>Platform</label>
        <span>Amazon ECS Fargate</span>
      </div>
      <div class="meta-item">
        <label>Region</label>
        <span>eu-central-1</span>
      </div>
      <div class="meta-item">
        <label>Runtime</label>
        <span>Java 21 · Spring Boot 3</span>
      </div>
      <div class="meta-item">
        <label>Status</label>
        <span><span class="status-dot"></span>Running</span>
      </div>
    </div>
  </div>
</body>
</html>
